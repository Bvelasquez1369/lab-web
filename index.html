<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeFans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container py-4">
        <div class="text-center mb-4">
            <h1 class="titulo-principal">🤖 PokeFans 🤖</h1>
            <p class="subtitulo">Pokemon Unicos</p>
        </div>

        <div class="card-glass mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label for="nombrePokemon" class="form-label fw-bold">Nombre del Pokemon</label>
                        <input type="text" class="form-control form-control-lg" id="nombrePokemon" placeholder="Pokemon">
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button class="btn btn-buscar w-100" id="botonBuscar">Buscar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="contenedorResultado" class="mb-4" style="display: none;">
            <div class="card-resultado">
                <div class="card-body text-center">
                    <img id="imagenPokemon" src="" alt="Imagen del Pokémon" class="img-fluid" style="max-width: 180px;">
                    <h3 id="nombrePokemonMostrado" class="mt-2 text-uppercase fw-bold"></h3>
                    <button class="btn btn-guardar mt-3" id="botonGuardarFavorito">Guardar Favorito</button>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-5 mb-3">
            <h2 class="seccion-titulo">Pokemon favoritos</h2>
            <div>
                <button class="btn btn-eliminar-uno me-2" id="botonEliminarUno">Eliminar 🗑️</button>
                <button class="btn btn-eliminar-todos" id="botonEliminarTodos">Eliminar todos 🗑️</button>
            </div>
        </div>
        <div id="listaFavoritos" class="row g-4">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
